name: Production Deployment
on:
  push:
    branches: [main]
  release:
    types: [published]
env:
  NODE_VERSION: '20'
jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Security audit
        run: npm audit --audit-level=critical || true

      - name: Smart contract security analysis
        run: |
          echo "Running smart contract security analysis..."
          # Add Slither or similar security analysis
          # Verify CertiK audit compliance

  production-deploy:
    needs: security-audit
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run full test suite
        run: |
          npx eslint . --max-warnings=200
          npm run lint:solidity
          npm run lint:style
          npm run test:coverage

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

